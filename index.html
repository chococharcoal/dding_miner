<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>직업 계산기 허브</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
*, input, select, button {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif !important;
  font-weight: 700;
}

:root {
  --bg:   #f7f3ee;
  --surf: #ffffff;
  --bdr:  #e8ddd0;
  --txt:  #2d1f12;
  --muted:#8a7060;
  --acc:  #e07b2a;

  --mining-c:  #e07b2a;
  --mining-bg: #fff8f2;
  --mining-bdr:#f5c89a;

  --farming-c:  #3a9e68;
  --farming-bg: #f0faf5;
  --farming-bdr:#8fd4ae;

  --ocean-c:   #3d6fd4;
  --ocean-bg:  #f0f5fd;
  --ocean-bdr: #8aaee8;
}

html, body {
  min-height: 100vh;
  background: var(--bg)
    radial-gradient(circle at 15% 20%, rgba(224,123,42,.08) 0%, transparent 50%),
    radial-gradient(circle at 85% 80%, rgba(61,111,212,.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(58,158,104,.05) 0%, transparent 60%);
  color: var(--txt);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.hub {
  width: 100%;
  max-width: 560px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
}

/* 헤더 */
.hub-hdr { text-align: center; }
.hub-title {
  font-family: 'Jua', sans-serif !important;
  font-size: 32px;
  color: var(--txt);
  letter-spacing: -.5px;
  line-height: 1.2;
}
.hub-title em { color: var(--acc); font-style: normal; }
.hub-sub {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 500;
}

/* 카드 그리드 */
.hub-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 100%;
}

.hub-card {
  display: flex;
  align-items: center;
  gap: 20px;
  background: var(--surf);
  border: 2px solid var(--bdr);
  border-radius: 18px;
  padding: 22px 24px;
  text-decoration: none;
  color: var(--txt);
  transition: transform .18s, box-shadow .18s, border-color .18s;
  box-shadow: 0 3px 12px rgba(0,0,0,.06);
  cursor: pointer;
}
.hub-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(0,0,0,.12);
}

.hub-card.mining  { border-color: var(--mining-bdr);  }
.hub-card.farming { border-color: var(--farming-bdr); }
.hub-card.ocean   { border-color: var(--ocean-bdr);   }

.hub-card.mining:hover  { border-color: var(--mining-c);  box-shadow: 0 8px 24px rgba(224,123,42,.18); }
.hub-card.farming:hover { border-color: var(--farming-c); box-shadow: 0 8px 24px rgba(58,158,104,.18); }
.hub-card.ocean:hover   { border-color: var(--ocean-c);   box-shadow: 0 8px 24px rgba(61,111,212,.18); }

.hub-icon {
  font-size: 44px;
  line-height: 1;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,.10));
}

.hub-info { flex: 1; min-width: 0; }
.hub-name {
  font-family: 'Jua', sans-serif !important;
  font-size: 20px;
  color: var(--txt);
  letter-spacing: -.3px;
}
.hub-card.mining  .hub-name { color: var(--mining-c);  }
.hub-card.farming .hub-name { color: var(--farming-c); }
.hub-card.ocean   .hub-name { color: var(--ocean-c);   }

.hub-desc {
  font-size: 12px;
  color: var(--muted);
  font-weight: 500;
  margin-top: 4px;
  line-height: 1.5;
}

.hub-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.hub-tag {
  font-size: 10px;
  font-weight: 700;
  border-radius: 20px;
  padding: 2px 8px;
  border: 1px solid;
}
.mining  .hub-tag { background: var(--mining-bg);  color: var(--mining-c);  border-color: var(--mining-bdr);  }
.farming .hub-tag { background: var(--farming-bg); color: var(--farming-c); border-color: var(--farming-bdr); }
.ocean   .hub-tag { background: var(--ocean-bg);   color: var(--ocean-c);   border-color: var(--ocean-bdr);   }

.hub-arrow {
  font-size: 20px;
  color: var(--muted);
  flex-shrink: 0;
  transition: transform .18s, color .18s;
}
.hub-card:hover .hub-arrow { transform: translateX(4px); color: var(--txt); }

/* 푸터 */
.hub-footer {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  text-align: center;
  line-height: 1.6;
}

/* 배경 장식 */
.deco {
  position: fixed;
  font-size: 80px;
  opacity: .04;
  pointer-events: none;
  user-select: none;
  z-index: 0;
}
.deco1 { top: 8%; left: 4%;  transform: rotate(-15deg); }
.deco2 { bottom: 10%; right: 5%; transform: rotate(20deg); }
.deco3 { top: 45%; left: 2%; transform: rotate(-8deg); font-size: 60px; }
</style>
</head>
<body>

<div class="deco deco1">⛏</div>
<div class="deco deco2">🌊</div>
<div class="deco deco3">🌿</div>

<div class="hub">

  <div class="hub-hdr">
    <div class="hub-title">직업 계산기 허브</div>
    <div class="hub-sub">원하는 직업 계산기를 선택하세요</div>
  </div>

  <div class="hub-cards">

    <a class="hub-card mining" href="mining.html">
      <div class="hub-icon">⛏</div>
      <div class="hub-info">
        <div class="hub-name">채광 계산기</div>
        <div class="hub-desc">채굴 수익 · 강화횃불 · 주괴 수익 최적화</div>
        <div class="hub-tags">
          <span class="hub-tag">하루 수익</span>
          <span class="hub-tag">80% 보정</span>
          <span class="hub-tag">교환 플랜</span>
          <span class="hub-tag">강화횃불</span>
        </div>
      </div>
      <div class="hub-arrow">→</div>
    </a>

    <a class="hub-card farming" href="farming.html">
      <div class="hub-icon">🌿</div>
      <div class="hub-info">
        <div class="hub-name">재배 계산기</div>
        <div class="hub-desc">작물 수익 · 요리 효율 · 재료 계산</div>
        <div class="hub-tags">
          <span class="hub-tag">씨앗 수익</span>
          <span class="hub-tag">요리 효율</span>
          <span class="hub-tag">재료 계산</span>
          <span class="hub-tag">베이스</span>
        </div>
      </div>
      <div class="hub-arrow">→</div>
    </a>

    <a class="hub-card ocean" href="ocean.html">
      <div class="hub-icon">🌊</div>
      <div class="hub-info">
        <div class="hub-name">해양 계산기</div>
        <div class="hub-desc">어패류 수익 · 조개 · 가공품 최적화</div>
        <div class="hub-tags">
          <span class="hub-tag">하루 수익</span>
          <span class="hub-tag">조개 계산</span>
          <span class="hub-tag">가공 최적화</span>
          <span class="hub-tag">정수</span>
        </div>
      </div>
      <div class="hub-arrow">→</div>
    </a>

  </div>

  <div class="hub-footer">
    스킬·각인석 설정은 각 계산기 내에서 저장됩니다<br>
    시세 자동채우기는 기준값 기반으로 동작합니다
  </div>

</div>
</body>
</html>
