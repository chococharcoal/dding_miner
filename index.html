<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>광부 계산기</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 스킬 패널 (전 탭 공통) -->
  <div class="skill-panel">
    <div class="skill-panel-title">⚡ 광부 전문가 스킬</div>
    <div class="skill-row">
      <span class="skill-name">🔥 초고속 용광로</span>
      <select id="skillFurnace" onchange="onSkillChange()">
        <option value="0">0랩 — 기본</option>
        <option value="1">1랩 — 10% 감소</option>
        <option value="2">2랩 — 30% 감소</option>
        <option value="3">3랩 — 40% 감소</option>
        <option value="4">4랩 — 60% 감소</option>
        <option value="5">5랩 — 80% 감소</option>
      </select>
      <span class="skill-info" id="skillFurnaceInfo">기본 (감소 없음)</span>
    </div>
    <div class="skill-row">
      <span class="skill-name">💎 주괴 좀 사</span>
      <select id="skillIngotSell" onchange="onSkillChange()">
        <option value="0">0랩 — 기본</option>
        <option value="1">1랩 — 5% 증가</option>
        <option value="2">2랩 — 7% 증가</option>
        <option value="3">3랩 — 10% 증가</option>
        <option value="4">4랩 — 20% 증가</option>
        <option value="5">5랩 — 30% 증가</option>
        <option value="6">6랩 — 50% 증가</option>
      </select>
      <span class="skill-info" id="skillIngotSellInfo">기본 (보너스 없음)</span>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <div class="tab on"  onclick="sw(0, this)">⛏ 채굴 수익</div>
    <div class="tab"     onclick="sw(1, this)">🔥 강화횃불</div>
    <div class="tab"     onclick="sw(2, this)">⚖ 주괴 최적화</div>
    <div class="tab"     onclick="sw(3, this)">📦 재료 가격</div>
  </div>

  <!-- ══ TAB 0: 채굴 수익 ══ -->
  <div id="t0" class="panel">

    <div class="card">
      <div class="card-title">곡괭이 & 스테미나</div>
      <div class="grid2">
        <div class="field">
          <label>곡괭이 강화</label>
          <select id="pickaxeLevel" onchange="cs()">
            <option value="0">0강</option>
            <option value="1">1강</option>
            <option value="2">2강</option>
            <option value="3">3강</option>
            <option value="4">4강</option>
            <option value="5">5강</option>
            <option value="6">6강</option>
            <option value="7">7강</option>
            <option value="8">8강</option>
            <option value="9">9강</option>
            <option value="10">10강</option>
            <option value="11">11강</option>
            <option value="12">12강</option>
            <option value="13">13강</option>
            <option value="14">14강</option>
            <option value="15">15강</option>
          </select>
        </div>
        <div class="field">
          <label>총 스테미나</label>
          <input id="totalStamina" type="number" placeholder="0" oninput="cs()">
        </div>
      </div>
      <div class="field">
        <label>캘 광석 종류</label>
        <select id="oreType" onchange="cs()">
          <option value="even">골고루 (3종 균등)</option>
          <option value="corum">코룸만</option>
          <option value="rifton">리프톤만</option>
          <option value="serent">세렌트만</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title">판매가 입력</div>
      <div class="grid3">
        <div class="field">
          <label>코룸 주괴 (원/개)</label>
          <input id="ingotPriceC" type="number" placeholder="0" oninput="cs()">
        </div>
        <div class="field">
          <label>리프톤 주괴 (원/개)</label>
          <input id="ingotPriceR" type="number" placeholder="0" oninput="cs()">
        </div>
        <div class="field">
          <label>세렌트 주괴 (원/개)</label>
          <input id="ingotPriceS" type="number" placeholder="0" oninput="cs()">
        </div>
        <div class="field">
          <label>보석 (원/개)</label>
          <input id="gemPrice" type="number" placeholder="0" oninput="cs()">
        </div>
        <div class="field">
          <label>항해포인트 (원/개)</label>
          <input id="naviPrice" type="number" placeholder="0" oninput="cs()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">계산 결과</div>
      <div id="sRes"><div class="empty-msg">값을 입력하면 계산됩니다</div></div>
    </div>

  </div>

  <!-- ══ TAB 1: 강화횃불 ══ -->
  <div id="t1" class="panel" style="display:none">

    <div class="card">
      <div class="card-title">재료 가격</div>
      <div class="grid2">
        <div class="field">
          <label>숯 / 석탄 (원/세트)</label>
          <input id="tCharcoalPrice" type="number" placeholder="0" oninput="ct()">
        </div>
        <div class="field">
          <label>막대기 (원/세트)</label>
          <input id="tStickPrice" type="number" placeholder="0" oninput="ct()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">제작 계획</div>
      <div class="grid2">
        <div class="field">
          <label>만들 횃불 수 (개)</label>
          <input id="tWantCount" type="number" placeholder="0" oninput="ct()">
        </div>
        <div class="field">
          <label>횃불 판매가 (원/개) <span class="opt">선택</span></label>
          <input id="tSellPrice" type="number" placeholder="미입력 시 재료비만" oninput="ct()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">계산 결과</div>
      <div id="tRes"><div class="empty-msg">값을 입력하면 계산됩니다</div></div>
    </div>

  </div>

  <!-- ══ TAB 2: 주괴 최적화 ══ -->
  <div id="t2" class="panel" style="display:none">

    <div class="card">
      <div class="card-title">보유 주괴</div>
      <div class="grid3">
        <div class="field">
          <label>코룸 주괴 (개)</label>
          <input id="iCo" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>리프톤 주괴 (개)</label>
          <input id="iRi" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>세렌트 주괴 (개)</label>
          <input id="iSe" type="number" placeholder="0" oninput="co()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">주괴 단가</div>
      <div class="grid3">
        <div class="field">
          <label>코룸 주괴 (원/개)</label>
          <input id="oCo" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>리프톤 주괴 (원/개)</label>
          <input id="oRi" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>세렌트 주괴 (원/개)</label>
          <input id="oSe" type="number" placeholder="0" oninput="co()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">제작물 판매가 & 제작시간</div>
      <div class="grid2">
        <div class="field">
          <label>하급 라이프스톤 (원/개)</label>
          <input id="oL1" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>하급 라스 제작시간 (초)</label>
          <input id="ctL1" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>중급 라이프스톤 (원/개)</label>
          <input id="oL2" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>중급 라스 제작시간 (초)</label>
          <input id="ctL2" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>상급 라이프스톤 (원/개)</label>
          <input id="oL3" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>상급 라스 제작시간 (초)</label>
          <input id="ctL3" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>어빌리티 스톤 (원/개)</label>
          <input id="oAb" type="number" placeholder="0" oninput="co()">
        </div>
        <div class="field">
          <label>어빌 스톤 제작시간 (초)</label>
          <input id="ctAb" type="number" placeholder="0" oninput="co()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">최적화 결과</div>
      <div id="oRes"><div class="empty-msg">값을 입력하면 계산됩니다</div></div>
    </div>

  </div>

  <!-- ══ TAB 3: 재료 가격 ══ -->
  <div id="t3" class="panel" style="display:none">

    <div class="card">
      <div class="card-title">바닐라 재료 세트(64개)당 가격</div>
      <div class="grid2">
        <div class="field">
          <label>조약돌</label>
          <input id="vCo" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>심층암 조약돌</label>
          <input id="vDc" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>구리 블럭</label>
          <input id="vCu" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>철 블럭</label>
          <input id="vIr" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>금 블럭</label>
          <input id="vGo" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>다이아 블럭</label>
          <input id="vDi" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>레드스톤 블럭</label>
          <input id="vRe" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>청금석 블럭</label>
          <input id="vLa" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>자수정 블럭</label>
          <input id="vAm" type="number" placeholder="0" oninput="cv()">
        </div>
        <div class="field">
          <label>기타</label>
          <input id="vEt" type="number" placeholder="0" oninput="cv()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">가격 현황</div>
      <div id="vRes"><div class="empty-msg">재료 가격 입력 후 계산됩니다</div></div>
    </div>

  </div>

  <script type="module">
    import { sw, cs, ct, co, cv, onSkillChange, init } from './app.js';

    window.sw            = sw;
    window.cs            = cs;
    window.ct            = ct;
    window.co            = co;
    window.cv            = cv;
    window.onSkillChange = onSkillChange;

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>

</html>>
